name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check acoustic_sandbox tests
      - run: python -m unittest discover -s tests -v
      - name: Exercise fixture and classification CLI
        run: |
          acoustic-sandbox fixtures --output-dir generated-fixtures
          acoustic-sandbox classify generated-fixtures/steady_tone.wav > generated-fixtures/result.json
          python -m json.tool generated-fixtures/result.json > /dev/null

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag acoustic-sandbox:ci .
